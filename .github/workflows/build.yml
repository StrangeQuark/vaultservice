name: VaultService Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, linux-server]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Retrieve Env Vars
        run: |
          echo "Copying vaultservice.env from secret file..."
          printf "%s\n" "${{ secrets.VAULT_ENV_FILE }}" > vaultservice.env
          echo "vaultservice.env copied."

      - name: Deploy with Docker Compose
        run: |
          set -e
          docker compose --env-file vaultservice.env up --build -d

          max_retries=40
          retry_interval=15
          success=0

          for i in $(seq 1 $max_retries); do
            echo "Health check attempt $i..."
            if curl -s -f http://localhost:6020/api/vault/health; then
              echo "Vault service is healthy!"
              success=1
              break
            else
              echo "Health check failed, retrying in $retry_interval seconds..."
              sleep $retry_interval
            fi
          done

          if [ $success -ne 1 ]; then
            echo "Health check ultimately failed. Tearing down containers."
            docker compose down
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          rm -f vaultservice.env
          echo "Cleaned up vaultservice.env"
